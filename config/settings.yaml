# ============================================================
# Agent Template - 基础配置
# ============================================================

app_name: "Agent Template"
version: "1.0.0"
log_level: "INFO"
prompts_dir: "prompts"

# ---------- LLM 配置 ----------
llm:
  provider: "dashscope"          # dashscope / openai
  model: "qwen-plus"
  api_key: ""                    # 建议通过环境变量 AGENT_LLM_API_KEY 设置
  base_url: null                 # OpenAI 兼容接口地址
  temperature: 0.7
  max_tokens: 2048
  top_p: 0.9
  timeout: 60

# ---------- RAG 配置 ----------
rag:
  enabled: false
  embedding_provider: "dashscope"
  embedding_model: "text-embedding-v3"
  embedding_api_key: ""
  embedding_dimension: 1024
  qdrant_host: "localhost"
  qdrant_port: 6333
  qdrant_grpc_port: 6334
  qdrant_use_grpc: true
  collection_name: "agent_docs"
  top_k: 5
  score_threshold: 0.5

# ---------- Memory 配置 ----------
memory:
  backend: "local"               # local / redis
  max_history: 20
  redis_url: "redis://localhost:6379/0"
  redis_prefix: "agent:memory:"
  ttl_seconds: 86400

# ---------- Server 配置 ----------
server:
  host: "0.0.0.0"
  port: 8000
  debug: false
  cors_origins:
    - "*"
